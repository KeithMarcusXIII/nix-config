コミットメッセージだけを返してください。説明、コードブロック、Markdown は不要です。"""
adaptive-format = """
以下に示す最近のコミットのスタイルに合わせてください。プロジェクトで使われている慣習に従い、最近のコミットを最優先の手がかりにしてください。

最近のコミットが conventional commits 形式（type: description）を使っている場合は、その形式に従ってください。
